<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trận đánh tiêu biểu</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#7b0f12;
    background-image:url("images/battle-bg.png");
    background-size:cover;
    background-attachment:fixed;
}

.overlay{
    min-height:100vh;
    background:rgba(255,255,255,.92);
}

.header{

    background:#8b0000;

    color:#ffd700;

    text-align:center;

    padding:25px;

    border-bottom:5px solid gold;

}

.header img{

    width:85px;

    margin-bottom:10px;

}

.header h1{

    margin:0;

    font-size:38px;

}

.container{

    max-width:1200px;

    margin:auto;

    padding:35px;

}

#cover{

    width:100%;

    border-radius:12px;

    margin-bottom:30px;

    box-shadow:0 6px 15px rgba(0,0,0,.25);

}

#title{

    color:#8b0000;

    text-align:center;

    margin-bottom:25px;

    font-size:40px;

}

audio{

    width:100%;

    margin-bottom:35px;

}

#content{

    background:#fff;

    border-radius:12px;

    padding:35px;

    line-height:2;

    font-size:18px;

    color:#222;

    box-shadow:0 5px 15px rgba(0,0,0,.18);

}

#content h1{

    color:#8b0000;

    text-align:center;

}

#content h2{

    color:#8b0000;

    margin-top:30px;

}

.back{

    display:inline-block;

    margin-top:35px;

    padding:12px 20px;

    background:#8b0000;

    color:#fff;

    text-decoration:none;

    border-radius:8px;

}

.back:hover{

    background:#b00000;

}

</style>

</head>

<body>

<div class="overlay">

<div class="header">

<img src="images/logo.png">

<h1>NHÀ TRUYỀN THỐNG SƯ ĐOÀN 5</h1>

</div>

<div class="container">

<img id="cover">

<h2 id="title"></h2>

<audio id="player" controls></audio>

<div id="content"></div>

<a href="battles.html" class="back">← Quay lại danh sách</a>

</div>

</div>

<script src="js/battle.js"></script>

</body>

</html>
